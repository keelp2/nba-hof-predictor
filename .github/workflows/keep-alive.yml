name: Keep Alive
on:
  schedule:
    - cron: '*/30 * * * *'
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake Streamlit app
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 30 https://nba-hof-predict.streamlit.app/)
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "App is awake"
              exit 0
            fi
            sleep 15
          done
          echo "App may still be booting"
