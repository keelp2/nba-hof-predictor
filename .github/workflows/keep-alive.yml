name: Keep Alive
on:
  schedule:
    - cron: '*/30 * * * *'
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake Streamlit app
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 --max-redirs 5 -L -H "User-Agent: Mozilla/5.0" https://nba-hof-predict.streamlit.app/ || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "303" ]; then
              echo "App pinged successfully"
              exit 0
            fi
            sleep 15
          done
          echo "Ping completed"
          exit 0
